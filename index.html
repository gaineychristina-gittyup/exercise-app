<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Claude Workout Buddy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="screen" data-screen="home">
        <header class="app__header">
          <h1>Claude Workout Buddy</h1>
          <p class="app__subtitle">Paste a workout. Tap start. Move.</p>
        </header>

        <div class="card">
          <label class="label" for="workout-input">Your workout</label>
          <p class="hint">
            One exercise per line. Include a duration like <code>30s</code>, <code>1 min</code>, or <code>0:45</code>.
            JSON also works.
          </p>
          <textarea
            id="workout-input"
            class="textarea"
            rows="10"
            spellcheck="false"
            placeholder="Squats - 40s&#10;Rest - 15s&#10;Push-ups - 40s&#10;Rest - 15s&#10;Plank - 1 min&#10;Rest - 15s&#10;Lunges - 40s"
          ></textarea>
          <div class="row row--actions">
            <button id="sample-btn" type="button" class="button button--ghost">Use sample</button>
            <button id="start-btn" type="button" class="button button--primary" disabled>Start workout</button>
          </div>
          <p id="summary" class="summary" aria-live="polite"></p>
          <ul id="preview-list" class="preview" aria-live="polite"></ul>
        </div>
      </section>

      <section class="screen hidden" data-screen="active" aria-live="polite">
        <div class="active__top">
          <div class="active__progress" id="progress">1 of 1</div>
          <button id="end-btn" type="button" class="link-btn">End</button>
        </div>
        <div class="active__exercise" id="exercise-name">—</div>
        <div class="active__timer" id="timer">0:00</div>
        <div class="active__next" id="next-up"></div>
        <div class="active__eta" id="eta"></div>
        <div class="active__actions">
          <button id="prev-btn" type="button" class="button button--ghost">Prev</button>
          <button id="pause-btn" type="button" class="button button--primary">Pause</button>
          <button id="skip-btn" type="button" class="button button--ghost">Skip</button>
        </div>
      </section>

      <section class="screen hidden" data-screen="done">
        <div class="done">
          <div class="done__title">Done</div>
          <p class="done__subtitle">Nice work.</p>
          <button id="new-btn" type="button" class="button button--primary">New workout</button>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
